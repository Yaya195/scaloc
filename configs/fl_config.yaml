federated:
  algorithm: fedavg
  rounds: 100
  local_epochs: 1
  client_fraction: 1.0
  min_clients: 2
  seed: 42
  
  # Client sampling
  num_clients_per_round: 5  # Number of clients to randomly sample per round (null = use all)
  sampling_strategy: random  # 'random' or 'all'

# Optional parallel client training (threaded). On a single GPU this can
# reduce idle time if CPU-side work dominates, but can also add contention.
parallel:
  enabled: true
  backend: process  # thread or process
  max_workers: null

scalability:
  # FL experiment: incrementally increase number of selected domains (K).
  # null means use all available domains.
  domain_counts: [3, 5, 7, 9, 11, 13, null]

  # Global-single-graph experiments (non-FL):
  # caps are applied on pooled data across all domains.
  max_rps_global: [25, 50, 75, 100, 150, 200, null]
  max_queries_global: [1000, 2500, 5000, 10000, 15000, 20000, null]

  rp_sample_seed: 42
  query_sample_seed: 42
